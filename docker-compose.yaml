networks:
  microservices-network:
    driver: bridge

services:
  kafka:
    image:            apache/kafka:4.3.1    #  Zookeeper = 3.x ; KRraft = 3.3+
    networks:
      - microservices-network
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID:                          1
      KAFKA_PROCESS_ROLES:                    broker,controller
      KAFKA_LISTENERS:                        PLAINTEXT://localhost:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES:        CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS:         1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:           1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:   1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:              1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:           0
      KAFKA_NUM_PARTITIONS:                             1

  postgres:
    image: postgres:bookworm
    networks:
      - microservices-network
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER:      username
      POSTGRES_PASSWORD:  password
      POSTGRES_DB:        default_database # The PostgreSQL default database (automatically created at first launch)

    ####
    ## If you want to use a `.env` file, please comment the `environment` section.
    ####

    # The `env_file` tag allows us to declare an environment file
    #env_file:
    #  - .env # The name of your environment file (the one at the repository root)

    #volumes:
    #  - ./db-data/:/var/lib/postgresql/data/

  prometheus:
    image: prom/prometheus:main
    #volumes:
    #  - ./Docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    networks:
      - microservices-network

  grafana:
    image: grafana/grafana:11.3.0
    #volumes:
    #  - ./Docker/grafana.yml:/etc/grafana/provisioning/datasources/datasource.yaml
    #  - grafana-data:/var/lib/grafana
    ports:
      - 3000:3000
    networks:
      - microservices-network
    #environment:
    #  - GF_SECURITY_ADMIN_USER=admin
    #  - GF_SECURITY_ADMIN_PASSWORD=password

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      - inventory-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083

      DB_HOST: inventory-service-db
      DB_PORT: 5432
      DB_NAME: inventory_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  procurement-service:
    build: ./procurement-service
    container_name: procurement-service
    depends_on:
      - procurement-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084

      DB_HOST: procurement-service-db
      DB_PORT: 5432
      DB_NAME: procurement_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  sales-service:
    build: ./sales-service
    container_name: sales-service
    depends_on:
      - sales-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085

      DB_HOST: sales-service-db
      DB_PORT: 5432
      DB_NAME: sales_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  user-service-db-data:
  inventory-service-db-data:
  procurement-service-db-data:
  sales-service-db-data: