networks:
  microservices-network:
    driver: bridge

services:
  kafka:
    image:            apache/kafka:4.3.1    #  Zookeeper = 3.x ; KRraft = 3.3+
    networks:
      - microservices-network
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID:                          1
      KAFKA_PROCESS_ROLES:                    broker,controller
      KAFKA_LISTENERS:                        PLAINTEXT://localhost:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES:        CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS:         1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:           1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:   1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:              1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:           0
      KAFKA_NUM_PARTITIONS:                             1

  postgres:
    image: postgres:bookworm
    networks:
      - microservices-network
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER:      username
      POSTGRES_PASSWORD:  password
      POSTGRES_DB:        default_database # The PostgreSQL default database (automatically created at first launch)

  prometheus:
    image: prom/prometheus:main
    #volumes:
    #  - ./Docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    networks:
      - microservices-network

  grafana:
    image: grafana/grafana:11.3.0
    #volumes:
    #  - ./Docker/grafana.yml:/etc/grafana/provisioning/datasources/datasource.yaml
    #  - grafana-data:/var/lib/grafana
    ports:
      - 3000:3000
    networks:
      - microservices-network
    #environment:
    #  - GF_SECURITY_ADMIN_USER=admin
    #  - GF_SECURITY_ADMIN_PASSWORD=password

  user-service-db:
    image: postgres:17
    container_name: user-service-db
    environment:
      POSTGRES_DB: user_service_db # always use underscore for this part
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - user-service-db-data:/var/lib/postgresql/data 
      # this means that the path to user-service-db-data is /var/lib/postgresql/data
      # so all db services will have same path, just different name like inventory-service-db-data ..

  inventory-service-db:
    image: postgres:17
    container_name: inventory-service-db
    environment:
      POSTGRES_DB: inventory_service_db # always use underscore for this part
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - inventory-service-db-data:/var/lib/postgresql/data

  sales-service-db:
    image: postgres:17
    container_name: sales-service-db
    environment:
      POSTGRES_DB: sales_service_db # always use underscore for this part
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - sales-service-db-data:/var/lib/postgresql/data

  procurement-service-db:
    image: postgres:17
    container_name: procurement-service-db
    environment:
      POSTGRES_DB: procurement_service_db # always use underscore for this part
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - procurement-service-db-data:/var/lib/postgresql/data

  api-gateway-service:
    build: ./api_gateway_service
    container_name: api-gateway-service
    ports:
      - "8080:8080"
    networks:
      - microservices-network

  discovery-service:
    build: ./discovery_service
    container_name: discovery-service
    ports:
      - "8081:8081"
    networks:
      - microservices-network

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - user-service
      - api-gateway-service
    networks:
      - microservices-network
    ports:
      - "4200:80"

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - user-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8082:8082"
    environment: 
      SERVER_PORT: 8082

      DB_HOST: user-service-db
      DB_PORT: 5432
      DB_NAME: user_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      - inventory-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083

      DB_HOST: inventory-service-db
      DB_PORT: 5432
      DB_NAME: inventory_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  procurement-service:
    build: ./procurement-service
    container_name: procurement-service
    depends_on:
      - procurement-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084

      DB_HOST: procurement-service-db
      DB_PORT: 5432
      DB_NAME: procurement_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  sales-service:
    build: ./sales-service
    container_name: sales-service
    depends_on:
      - sales-service-db
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085

      DB_HOST: sales-service-db
      DB_PORT: 5432
      DB_NAME: sales_service_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - kafka
      - discovery-service
    networks:
      - microservices-network
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086

      EUREKA_HOST: discovery-service
      EUREKA_PORT: 8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  user-service-db-data:
  inventory-service-db-data:
  procurement-service-db-data:
  sales-service-db-data: